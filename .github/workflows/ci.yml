name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  test-backend:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dashboard_restaurante_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dashboard_restaurante_test"
      JWT_SECRET: "ci-test-secret-key-2026"
      JWT_EXPIRES: "1h"
      REFRESH_EXPIRES: "7d"
      ADMIN_CODE: "test-admin"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma db push --skip-generate
      - run: npm run test:coverage
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: server/coverage/

  test-frontend:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run test:coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dashboard_restaurante_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dashboard_restaurante_test"
      JWT_SECRET: "ci-test-secret-key-2026"
      JWT_EXPIRES: "1h"
      ADMIN_CODE: "test-admin"
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: cd server && npm ci
      - run: cd server && npx prisma db push --skip-generate
      - name: Seed admin user para E2E
        run: |
          cd server && node -e "
          const { PrismaClient } = require('./generated/prisma');
          const bcrypt = require('bcryptjs');
          const prisma = new PrismaClient();
          async function seed() {
            await prisma.restaurante.upsert({
              where: { id: 1 },
              create: { id:1, nombre:'CI Test', slug:'ci-test', plan:'basic', activo:true },
              update: {}
            });
            const hash = await bcrypt.hash('password123', 10);
            await prisma.usuario.upsert({
              where: { email: 'admin@test.com' },
              create: { nombre:'Admin CI', email:'admin@test.com', password_hash:hash, rol:'admin', restaurante_id:1 },
              update: {}
            });
            await prisma.\$disconnect();
          }
          seed().catch(e => { console.error(e); process.exit(1); });
          "
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Install serve for static build
        run: npm install -g serve
      - run: npm run test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: dashboard-restaurante:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dashboard-restaurante:latest
            ${{ secrets.DOCKER_USERNAME }}/dashboard-restaurante:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
